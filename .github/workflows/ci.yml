name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check

  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [server, client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run ${{ matrix.workspace }} tests
        run: npm run test --workspace ${{ matrix.workspace }}

  build:
    name: Build client
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  security-scan:
    name: Dependency & malware scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Built-in advisory check. `|| true` keeps the job green so the scan
      # below always runs even when advisories exist in transitive deps.
      - name: npm audit (advisories)
        run: npm audit --audit-level=high || true
      # ---------------------------------------------------------------------
      # Plug your malware scanner in here. It runs after `npm ci`, so the full
      # dependency tree is materialised under node_modules/ and ready to scan.
      # Example:
      #   - name: Run malware scan
      #     run: npx your-malware-scanner scan ./node_modules
      # ---------------------------------------------------------------------
      - name: Malware scan (placeholder)
        run: |
          echo "node_modules is installed and ready to scan."
          echo "Replace this step with your malware scanning feature."
